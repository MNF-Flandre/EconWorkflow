[workspace]
name = "econ-research-workflow"
default_language = "zh-CN"
projects_dir = "projects"
agents_dir = "agents"
shared_notes_dir = "shared-notes"
econ_os_version = "2.0"
econ_os_schemas_dir = "shared-notes/.econ-os/schemas"
econ_os_templates_dir = "shared-notes/.econ-os"

[workflow]
version = "econ-os-2.0"
description = "5-Phase Automated Economics Research Pipeline"
process_templates_file = "shared-notes/.econ-os/process_templates.json"
agent_roles_file = "shared-notes/.econ-os/AGENT_ROLES.md"
active_workflow = "econ-os-2.0"

[phases]
phase_1 = "Discovery - Ideation & Literature Alignment"
phase_2 = "Mapping & Lock - Specification Freeze"
phase_3 = "Data Ops - Data Engineering & Quality Audit"
phase_4 = "Econometrics - Execution & Adversarial Testing"
phase_5 = "Synthesis - Economics Interpretation & Audit Trail"

[automation]
decision_log_enabled = true
auto_rollback_enabled = true
scorecard_validation = "mandatory"
decision_log_file = ".econ-os/decision_log.jsonl"

[llm]
# Public repo 默认体验：prompt-only（无需 API key）。
# 如需真实模型调用，请改为 mode = "openai-compatible" 并配置 api_key_env 对应环境变量，再在命令中使用 --execute。
mode = "prompt-only"
base_url = "https://api.openai.com/v1"
model = "gpt-4"
api_key_env = "OPENAI_API_KEY"
temperature = 0.2
max_tokens = 4000
